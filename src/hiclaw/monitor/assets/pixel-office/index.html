<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hiclaw Pixel Office</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <main class="dashboard-grid">
      <section class="office-panel">
        <div class="panel-head">
          <div>
            <h2>Office View</h2>
            <p>角色会在办公室内巡航、回工位、等待你确认，并展示辅助 worker 的活跃状态。</p>
          </div>
          <div class="panel-badge" id="activeRunsBadge">0 active runs</div>
        </div>
        <canvas id="officeCanvas" width="960" height="640" aria-label="Pixel office canvas"></canvas>
      </section>

      <aside class="info-panel">
        <section class="metric-card">
          <p class="metric-label">State</p>
          <p class="metric-value" id="metricState">Idle</p>
          <p class="metric-note">空闲时会在活动区内散步，工作时会回工位。</p>
        </section>
        <section class="metric-card">
          <p class="metric-label">Current Task</p>
          <p class="metric-body" id="metricTask">暂无任务</p>
        </section>
        <section class="metric-card">
          <p class="metric-label">Current Tool</p>
          <p class="metric-body" id="metricTool">无</p>
        </section>
        <section class="metric-card">
          <p class="metric-label">Last Active</p>
          <p class="metric-body" id="metricLastActive">-</p>
        </section>
        <section class="metric-card">
          <p class="metric-label">Channels</p>
          <p class="metric-body" id="metricChannel">-</p>
        </section>
        <section class="metric-card">
          <p class="metric-label">Team View</p>
          <div class="run-list" id="runList"></div>
        </section>
      </aside>
    </main>
  </div>

  <script src="./dashboard-ui.js"></script>
  <script src="./office-engine.js"></script>
  <script src="./app.js"></script>
</body>
</html>
