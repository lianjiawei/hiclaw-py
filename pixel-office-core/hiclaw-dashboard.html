<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HiClaw 多智能体办公室 Core</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090d14;
        --panel: rgba(17, 22, 32, 0.94);
        --panel-soft: rgba(24, 30, 42, 0.92);
        --border: rgba(176, 190, 216, 0.16);
        --text: #f4f7fb;
        --muted: #9aa7b9;
        --accent: #63e6be;
        --blue: #7c9bff;
        --yellow: #ffd166;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #101620 0%, var(--bg) 48%, #070a10 100%);
      }

      body {
        padding: 16px;
      }

      .shell {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        gap: 14px;
        min-height: calc(100vh - 32px);
      }

      .panel,
      .stage {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      }

      .panel {
        padding: 14px;
        overflow: auto;
      }

      .stage {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      #office {
        width: 100%;
        height: 100%;
        min-height: 620px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 22px;
        line-height: 1.15;
      }

      .hint,
      .meta,
      .agent-summary {
        color: var(--muted);
      }

      .hint {
        margin: 0 0 14px;
        font-size: 13px;
        line-height: 1.5;
      }

      .status-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 12px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 24px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 12px;
        white-space: nowrap;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--blue);
      }

      .dot.working {
        background: var(--accent);
      }

      .dot.waiting,
      .dot.blocked {
        background: var(--yellow);
      }

      .agent-card {
        margin-top: 10px;
        padding: 11px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: var(--panel-soft);
      }

      .agent-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .agent-name {
        font-weight: 700;
      }

      .agent-summary {
        margin: 0;
        font-size: 12px;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .meta {
        font-size: 12px;
      }

      @media (max-width: 900px) {
        body {
          padding: 10px;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        #office {
          height: 68vh;
          min-height: 460px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <aside class="panel">
        <h1>HiClaw 多智能体办公室</h1>
        <p class="hint">这个页面由 pixel-office-core 独立渲染，状态来自 HiClaw 的监控命令流。</p>
        <div class="status-line">
          <span class="badge"><i class="dot" id="clusterDot"></i><span id="clusterState">连接中</span></span>
          <span class="meta" id="updatedAt">-</span>
        </div>
        <section id="agentList"></section>
      </aside>
      <section class="stage">
        <div id="office"></div>
      </section>
    </main>

    <script type="module" src="/core/hiclaw-dashboard.js?v=core-7"></script>
  </body>
</html>
